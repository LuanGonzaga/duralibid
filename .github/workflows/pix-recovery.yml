name: Pix recovery

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  recover:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Trigger Pix recovery
        run: |
          curl --fail --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://www.duralibid.com.br/api/pix-recovery
